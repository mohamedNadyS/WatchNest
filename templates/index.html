<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
        <title>WatchNest</title>
        <style>
            body {
                background: linear-gradient(135deg,#2c3e50 0%,#000000 100%);
                height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                color:ghostwhite;
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            }
            .card {
                background:rgba(255, 255, 255, 0.1);
                backdrop-filter: blur(15px);
                border:1px solid rgba(255, 255, 255, 0.2);
                border-radius: 24px;
                padding:4rem 2rem;
                text-align: center;
                box-shadow: 0 20px 50px 0 rgba(14, 18, 71, 0.37); 
            }
            .nest-icon {
                font-size: 4rem;
                color: #3498db;
                margin-bottom: 1rem;
            }
            .btn-google {
                background-color: #ddcacaec;
                color: #111;
                border-radius: 50px;
                padding: 12px 30px;
                font-weight: 600;
                border:none;
                transition: all 0.3 ease-in-out;
                margin-top: 2rem;
            }
            .btn-google:hover {
                background-color: #c1b0b0;
                color: #000;
                transform: scale(1.05);
                box-shadow: 0 5px 15px rgba(255, 255, 255, 0.2);
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-8 col-lg-6">
                    <div class="card">
                        <div class="nest-icon">
                            <i class="bi bi-stack"></i>
                        </div>
                        <h1 class="display-4 fw-blod mb-3" style="color:#b0b9d1">Welcome to WatchNest</h1>
                        <p class="lead mb-4" style="color:#b0b9d1">Your personal nest for movies and TV shows. Sign in with Google to start building your watchlist</p>
                        <hr class="my-4 border-secondary opacity-25">
                        <button type="button" class="btn btn-google btn-lg" onclick="location.href='{{url_for('google.login')}}'">
                            <i class="bi bi-google me-2"></i> Sign in with Google
                        </button>
                    </div>

                </div>
            </div>
        </div>
    </body>
</html>
