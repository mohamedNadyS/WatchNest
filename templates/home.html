<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <title>WatchNest - Home</title>
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1">WatchNest</span>
            <div>
                <a href="{{ url_for('logout') }}" class="btn btn-sm btn-outline-light">Logout</a>
                <a href="{{ url_for('delete_acc') }}" class="btn btn-sm btn-danger" onclick="return confirm('Delete everything?')">Delete Account</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Welcome, {{ name }}!</h2>
            <a href="{{ url_for('add') }}" class="btn btn-primary">+ Add New</a>
        </div>

        <div class="row">
            <div class="col-md-6">
                <div class="card shadow-sm">
                    <div class="card-header bg-primary text-white">Movies</div>
                    <ul class="list-group list-group-flush">
                        {% for movie in movies %}
                        <li class="list-group-item d-flex justify-content-between align-items-center">
                            {{ movie.title }}
                            <div>
                                <a href="{{ url_for('edit', category='movie', id=movie.id) }}" class="text-primary me-2">Edit</a>
                                <a href="{{ url_for('delete', type='movie', id=movie.id) }}" class="text-danger">Delete</a>
                            </div>
                        </li>
                        {% endfor %}
                    </ul>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card shadow-sm">
                    <div class="card-header bg-success text-white">TV Shows</div>
                    <ul class="list-group list-group-flush">
                        {% for show in shows %}
                        <li class="list-group-item d-flex justify-content-between align-items-center">
                            {{ show.title }}
                            <div>
                                <a href="{{ url_for('edit', category='show', id=show.id) }}" class="text-primary me-2">Edit</a>
                                <a href="{{ url_for('delete', type='show', id=show.id) }}" class="text-danger">Delete</a>
                            </div>
                        </li>
                        {% endfor %}
                    </ul>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
